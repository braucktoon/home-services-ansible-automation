---
- name: Create the {{container_name}} config folder
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{container_name}}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Make sure the {{container_name}} container is created and running
  community.general.docker_container:
    name: "{{container_name}}"
    image: homeassistant/home-assistant:2026.3.3
    pull: yes
    state: "started"
    privileged: true
    network_mode: "host"
    volumes:
      - "{{ docker_dir }}/{{container_name}}/config:/config"
      - "/etc/localtime:/etc/localtime:ro"
      - "{{ docker_dir }}/{{container_name}}/media:/media"
    restart_policy: always
  become: false

- name: Create the matter-server data folder
  ansible.builtin.file:
    path: "{{ docker_dir }}/matter-server"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Make sure the matter-server container is created and running
  community.general.docker_container:
    name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:8.1
    pull: yes
    state: started
    network_mode: host
    command: ["--storage-path", "/data", "--primary-interface", "eth0"]
    volumes:
      - "{{ docker_dir }}/matter-server:/data"
      - "/run/dbus:/run/dbus"
    restart_policy: always
  become: false

- name: Make {{container_name}} backup directory
  ansible.builtin.file:
    path: "{{ backups_dir }}/{{container_name}}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Copy backup script file in place.
  template:
    src: "templates/backup-basic-docker.sh.j2"
    dest: "/usr/local/bin/backup-{{container_name}}.sh"
    owner: root
    group: root
    mode: 0755

- name: Add cron job to run backup weekly, at midnight on Sundays.
  ansible.builtin.cron:
    name: Run {{container_name}}-backup script.
    minute: "0"
    hour: "0"
    weekday: "0"
    job: "/usr/local/bin/backup-{{container_name}}.sh"
    state: present
  become: false

- name: Make matter-server backup directory
  ansible.builtin.file:
    path: "{{ backups_dir }}/matter-server"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Copy matter-server backup script file in place.
  template:
    src: "templates/backup-basic-docker.sh.j2"
    dest: "/usr/local/bin/backup-matter-server.sh"
    owner: root
    group: root
    mode: 0755
  vars:
    container_name: matter-server

- name: Add cron job to run matter-server backup weekly, at midnight on Sundays.
  ansible.builtin.cron:
    name: Run matter-server-backup script.
    minute: "0"
    hour: "0"
    weekday: "0"
    job: "/usr/local/bin/backup-matter-server.sh"
    state: present
  become: false

- name: Add IPv6 forwarding and RA settings to sysctl.conf for Thread/Matter
  ansible.builtin.blockinfile:
    path: /etc/sysctl.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - matter/thread ipv6"
    block: |
      net.ipv6.conf.eth0.accept_ra=2
      net.ipv6.conf.eth0.forwarding=1

      # Allow the Pi to accept the specific /64 routes from the HomePod
      net.ipv6.conf.eth0.accept_ra_rt_info_max_plen = 64

- name: Add delayed sysctl reload to rc.local for Thread/Matter
  ansible.builtin.lineinfile:
    path: /etc/rc.local
    line: "(sleep 15; /sbin/sysctl -p) &"
    insertbefore: "^exit 0"
    state: present